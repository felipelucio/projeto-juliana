<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js"></script>
</head>
<body>
    <div class="container">
        <div class="title">Meeting</div>
        <div class="cams_container">
            <div class="cam_box user_view">
                <div class="user_name user">User 1</div>
                <video id="cam-video" width="100%" height="100%" autoplay></video>
                <div class="mic-icon on"></div>
            </div>
            <div class="cam_box interviewer_view">
                <div class="user_name interviewer">User 2</div>
                <video id="video" width="100%" height="100%" autoplay></video>
                <div class="mic-icon on"></div>
            </div>
        </div>
        <div class="toolbar"></div>
    </div>
</body>
</html>
